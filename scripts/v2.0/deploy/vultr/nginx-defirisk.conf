# Split-host routing template:
# - www.<domain>: public marketing/help pages
# - app.<domain>: authenticated app workflows
# Replace hodler-suite.com with your real domain when needed.

server {
    listen 80;
    listen [::]:80;
    server_name hodler-suite.com;
    return 301 https://www.hodler-suite.com$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name www.hodler-suite.com;

    client_max_body_size 10m;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location ~ ^/(|faq|help-center)/?$ {
        proxy_pass http://127.0.0.1:5050;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
    }

    location ^~ /api/v1/support/ {
        proxy_pass http://127.0.0.1:5050;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
    }

    location ^~ /static/ {
        proxy_pass http://127.0.0.1:5050;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        return 302 https://app.hodler-suite.com$request_uri;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name app.hodler-suite.com;

    client_max_body_size 10m;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location = / {
        return 302 https://app.hodler-suite.com/dashboard;
    }

    location ~ ^/(faq|help-center)/?$ {
        return 302 https://www.hodler-suite.com$request_uri;
    }

    # Internal webhook endpoints are blocked from public ingress.
    location ^~ /webhook/ {
        deny all;
        return 403;
    }

    # App host proxies all routes, while auth in Flask restricts sensitive paths.
    location / {
        proxy_pass http://127.0.0.1:5050;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180;
    }
}
