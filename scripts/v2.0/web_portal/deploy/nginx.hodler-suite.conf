# /etc/nginx/sites-available/hodler-suite-web-portal.conf
# Production reverse-proxy for Hodler Suite web portal.

upstream hodler_web_portal {
    server 127.0.0.1:5050;
    keepalive 32;
}

# Redirect HTTP to HTTPS while preserving host.
server {
    listen 80;
    server_name hodler-suite.com www.hodler-suite.com app.hodler-suite.com;
    return 301 https://$host$request_uri;
}

# Docs domain HTTP -> HTTPS
server {
    listen 80;
    server_name docs.hodler-suite.com;
    return 301 https://docs.hodler-suite.com$request_uri;
}

# Redirect www to apex marketing domain.
server {
    listen 443 ssl http2;
    server_name www.hodler-suite.com;

    ssl_certificate /etc/letsencrypt/live/hodler-suite.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hodler-suite.com/privkey.pem;

    return 301 https://hodler-suite.com$request_uri;
}

# Marketing/public domain (anonymous flows).
server {
    listen 443 ssl http2;
    server_name hodler-suite.com;

    ssl_certificate /etc/letsencrypt/live/hodler-suite.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hodler-suite.com/privkey.pem;

    client_max_body_size 2m;

    location /static/ {
        proxy_pass http://hodler_web_portal;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location / {
        proxy_pass http://hodler_web_portal;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";

        proxy_cache_bypass $http_cookie $cookie_session;
        proxy_no_cache $http_cookie $cookie_session;
        proxy_pass_header Set-Cookie;
        proxy_pass_header Vary;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}

# Main application domain.
server {
    listen 443 ssl http2;
    server_name app.hodler-suite.com;

    ssl_certificate /etc/letsencrypt/live/app.hodler-suite.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.hodler-suite.com/privkey.pem;

    client_max_body_size 2m;

    # Keep static assets cacheable.
    location /static/ {
        proxy_pass http://hodler_web_portal;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location / {
        proxy_pass http://hodler_web_portal;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";

        # Do not serve cached authenticated HTML from proxy cache.
        proxy_cache_bypass $http_cookie $cookie_session;
        proxy_no_cache $http_cookie $cookie_session;

        # Preserve upstream auth/session behavior.
        proxy_pass_header Set-Cookie;
        proxy_pass_header Vary;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}

# Public docs static site.
server {
    listen 443 ssl http2;
    server_name docs.hodler-suite.com;

    ssl_certificate /etc/letsencrypt/live/docs.hodler-suite.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/docs.hodler-suite.com/privkey.pem;

    root /var/www/hodler-suite-docs;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
