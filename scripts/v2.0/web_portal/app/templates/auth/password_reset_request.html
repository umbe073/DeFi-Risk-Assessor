{% extends "base.html" %}
{% block title %}Password Reset - Hodler Suite{% endblock %}
{% block content %}
<section class="panel-block narrow">
  <h1>Reset Password</h1>
  <p>Enter your account email. If the account exists, we will send a password reset link.</p>

  <form method="post" class="stacked-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>Email</label>
    <input type="email" name="email" autocomplete="email" required>
    <button type="submit">Send Reset Link</button>
  </form>

  <p class="inline-note"><a href="{{ url_for('auth.login') }}">Back to sign in</a></p>
</section>
{% endblock %}
