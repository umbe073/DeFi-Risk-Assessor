{% extends "base.html" %}
{% block title %}Set Up 2FA - Hodler Suite{% endblock %}
{% block content %}
<section class="panel-block narrow">
  <h1>Set Up Two-Factor Authentication</h1>
  <p>Add this account in your authenticator app, then confirm with a 6-digit code.</p>

  <div class="stacked-form">
    <label>Issuer</label>
    <input type="text" value="{{ issuer }}" readonly>
    <label>Account</label>
    <input type="text" value="{{ email }}" readonly>
    <label>Secret (manual entry)</label>
    <input type="text" value="{{ secret }}" readonly>
    <label>otpauth URI</label>
    <textarea rows="3" readonly>{{ otp_uri }}</textarea>
  </div>

  <form method="post" action="{{ url_for('auth.enable_two_factor') }}" class="stacked-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>Enter current 6-digit code</label>
    <input type="text" name="code" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" required>
    <button type="submit">Enable 2FA</button>
  </form>
</section>
{% endblock %}
