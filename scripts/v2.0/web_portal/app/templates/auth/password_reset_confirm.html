{% extends "base.html" %}
{% block title %}Set New Password - Hodler Suite{% endblock %}
{% block content %}
<section class="panel-block narrow">
  <h1>Set New Password</h1>
  <p>Choose a new password for your account.</p>

  <form method="post" class="stacked-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input type="hidden" name="token" value="{{ token }}">
    <label>New password (min 12 chars)</label>
    <input type="password" name="new_password" minlength="12" autocomplete="new-password" required>
    <label>Confirm password</label>
    <input type="password" name="confirm_password" minlength="12" autocomplete="new-password" required>
    <button type="submit">Update Password</button>
  </form>

  <p class="inline-note"><a href="{{ url_for('auth.login') }}">Back to sign in</a></p>
</section>
{% endblock %}
