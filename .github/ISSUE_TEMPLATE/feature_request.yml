name: Internal feature request
description: Suggest an improvement or new capability for the Hodler Suite UAB SaaS platform.
title: "feat: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What customer, operator, compliance, or engineering problem should this solve?
      placeholder: Describe the user or operator pain point.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should change?
      placeholder: Describe the desired behavior.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Risk assessment / engine
        - Live Assessment
        - API Center / Settings
        - Web portal / UI
        - Billing / payments
        - Support / Slack / email
        - GitHub Actions / deploy
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Optional.
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - Given ...
        - When ...
        - Then ...
    validations:
      required: false

  - type: checkboxes
    id: scope
    attributes:
      label: Scope notes
      options:
        - label: This request does not include secrets, private customer data, or confidential business context beyond what reviewers need.
          required: true
        - label: I understand website/web_portal changes may require the manual deploy path.
          required: false
