name: Bug report
description: Report a reproducible problem in Hodler Suite.
title: "fix: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include secrets, cookies, private keys, webhook URLs, signed URLs, customer data, or raw logs containing sensitive data.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Describe the issue in a few sentences.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Risk assessment / engine
        - Live Assessment
        - API Center / Settings
        - Web portal / UI
        - Billing / payments
        - Support / Slack / email
        - GitHub Actions / deploy
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reproducible case.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, server path, branch/commit, plan/tier, or relevant service.
      placeholder: |
        Browser:
        OS:
        Branch/commit:
        Deployment path:
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs or screenshots
      description: Remove secrets and personal data before attaching.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: safety
    attributes:
      label: Safety checklist
      options:
        - label: I removed secrets, private keys, tokens, cookies, webhook URLs, signed URLs, and customer data.
          required: true
        - label: This is not a security vulnerability report. If it is, I will follow SECURITY.md instead.
          required: true
