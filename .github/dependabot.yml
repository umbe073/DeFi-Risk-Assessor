# Dependabot version updates (scheduled PRs). Complements:
# - Repo Settings → Code security → Dependabot alerts
# - Repo Settings → Code security → Dependabot security updates (opens fix PRs for GHSA/CVE)
#
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # Python deps (root requirements.txt)
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 15
    labels:
      - dependencies
      - python
    commit-message:
      prefix: chore(deps)
    # Batch low-risk bumps into one PR; major upgrades stay separate for safer review.
    groups:
      pip-patch-minor:
        patterns:
          - "*"
        update-types:
          - patch
          - minor

  # Action pins in .github/workflows/*.yml
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci(deps)
