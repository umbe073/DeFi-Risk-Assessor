name: "CodeQL Config"

# CodeQL scope for Hodler Suite.
# We only ship two trees in production:
#   - scripts/v2.0/web_portal  (Flask web portal, deployed manually)
#   - scripts/v2.8             (current engine, deployed via systemd service)
# Everything else (legacy versions, archived scripts, vendored data, build/test
# fixtures) is intentionally excluded to keep the alert backlog actionable.

paths:
  - scripts/v2.0/web_portal
  - scripts/v2.8
  - .github/workflows
  - .github/actions

paths-ignore:
  # Legacy/archived script trees we no longer ship.
  - scripts/v0.1
  - scripts/v0.5
  - scripts/v1.0
  - scripts/v1.2
  - scripts/v1.3
  - scripts/v1.4
  - scripts/v1.5
  # v2.0 desktop bits (dashboard/credential GUIs, fixers, archives, tests, deploy
  # scripts) are out of scope; only the web_portal is supported under v2.0.
  - scripts/v2.0/archive
  - scripts/v2.0/dashboard
  - scripts/v2.0/credential_management
  - scripts/v2.0/fixes
  - scripts/v2.0/tests
  - scripts/v2.0/deploy
  # v2.8 archived/obsolete + tests are not part of the deployed surface.
  - scripts/v2.8/archive
  - scripts/v2.8/tests
  - scripts/v2.8/deploy
  # Generic noise.
  - data/**
  - logs/**
  - site/**
  - site_public/**
  - docs/**
  - .cache/**
  - "**/__pycache__/**"
  - "**/*.db"
  - "**/.venv/**"
  - "**/backup_*/**"
  - "**/obsolete_scripts/**"

queries:
  - uses: security-and-quality
