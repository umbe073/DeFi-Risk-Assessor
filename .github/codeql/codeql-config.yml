name: "CodeQL Config"

# CodeQL scope for Hodler Suite.
#
# Shipped from this repository: scripts/v2.8 app/risk code. Web portal and deploy
# playbooks are private/manual (not in Git); see paths-ignore below.
#
# We use `paths-ignore` only (CodeQL Python autobuild is unhappy with explicit
# `paths:` filters on this repo). The ignore list keeps legacy versions, archived
# scripts, vendored data, build/test fixtures, and the v2.0 desktop dashboard out
# of analysis so the alert backlog stays focused on shipped surface.

paths-ignore:
  # Legacy / archived script trees we no longer ship.
  - scripts/v0.1/**
  - scripts/v0.5/**
  - scripts/v1.0/**
  - scripts/v1.2/**
  - scripts/v1.3/**
  - scripts/v1.4/**
  - scripts/v1.5/**
  # v2.0 non-portal surface (desktop GUIs, fixers, archives, tests, deploy scripts).
  - scripts/v2.0/archive/**
  - scripts/v2.0/dashboard/**
  - scripts/v2.0/credential_management/**
  - scripts/v2.0/fixes/**
  - scripts/v2.0/tests/**
  - scripts/v2.0/deploy/**
  - scripts/v2.0/web_portal/**
  # v2.8 archived/obsolete + tests are not part of the deployed surface.
  - scripts/v2.8/archive/**
  - scripts/v2.8/tests/**
  - scripts/v2.8/deploy/**
  # Generic noise.
  - data/**
  - logs/**
  - site/**
  - site_public/**
  - docs/**
  - .cache/**
  - "**/__pycache__/**"
  - "**/*.db"
  - "**/.venv/**"
  - "**/backup_*/**"
  - "**/obsolete_scripts/**"

# Use the security-extended suite only. `security-and-quality` adds dozens of
# code-quality / maintainability rules (e.g. "Unused global variable", note
# severity) which produced ~1.1k informational alerts on the in-scope tree.
# Quality is already enforced via flake8 / pyflakes in the PR Checks workflow.
queries:
  - uses: security-extended
