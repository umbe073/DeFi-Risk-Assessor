name: Slack Bugbot Follow-Up PR Opened

on:
  pull_request_target:
    types:
      - opened
      - reopened

permissions:
  contents: read
  pull-requests: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack when a Bugbot-style follow-up PR is opened
        uses: actions/github-script@v7
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_GITHUB_PULL_REQUESTS_WEBHOOK_URL }}
        with:
          script: |
            const webhook = process.env.SLACK_WEBHOOK_URL || "";
            if (!webhook) {
              core.warning("SLACK_GITHUB_PULL_REQUESTS_WEBHOOK_URL is not configured; skipping.");
              return;
            }

            const pr = context.payload.pull_request;
            if (!pr) {
              core.info("No pull request payload.");
              return;
            }

            const actor = String(context.payload.sender?.login || "");
            const author = String(pr.user?.login || "");
            const title = String(pr.title || "");
            const body = String(pr.body || "");
            const headRef = String(pr.head?.ref || "");
            const haystack = `${title}\n${body}\n${headRef}`.toLowerCase();

            const hasBugbotSignal = ["bugbot", "autofix", "follow-up", "followup"].some((token) =>
              haystack.includes(token),
            );
            if (!hasBugbotSignal) {
              core.info("No Bugbot follow-up signal in title/body/head ref.");
              return;
            }

            const refMatches = [...haystack.matchAll(/#([0-9]+)/g)];
            const relatedPrs = Array.from(
              new Set(
                refMatches
                  .map((m) => Number(m[1] || 0))
                  .filter((n) => Number.isInteger(n) && n > 0 && n !== Number(pr.number || 0)),
              ),
            );
            const relatedLine =
              relatedPrs.length > 0
                ? `*Related PRs referenced:* ${relatedPrs.map((n) => `#${n}`).join(", ")}`
                : "*Related PRs referenced:* none detected";

            const payload = {
              text: [
                "⚠️ *Intermediate Notice*",
                "The previous PR may not be definitive: a Bugbot-related follow-up PR was opened for additional fixes.",
                "",
                `*PR:* <${pr.html_url}|#${pr.number} ${title}>`,
                `*Branch:* \`${headRef}\``,
                `*Author:* \`${author || "unknown"}\``,
                `*Triggered by:* \`${actor || "unknown"}\``,
                relatedLine,
                "",
                "Please wait for this PR checks/review before final approval decisions on related changes.",
              ].join("\n"),
            };

            const res = await fetch(webhook, {
              method: "POST",
              headers: { "Content-Type": "application/json; charset=utf-8" },
              body: JSON.stringify(payload),
            });
            if (!res.ok) {
              const raw = await res.text();
              core.setFailed(`Slack webhook failed: HTTP ${res.status} ${raw}`);
            }
