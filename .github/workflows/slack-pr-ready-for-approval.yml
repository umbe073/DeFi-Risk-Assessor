name: Slack PR Review Completion Notification

on:
  pull_request_review:
    types:
      - submitted

permissions:
  contents: read
  checks: write
  actions: read
  pull-requests: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack when PR review is finalized
        uses: actions/github-script@v7
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_GITHUB_PULL_REQUESTS_WEBHOOK_URL }}
        with:
          script: |
            const NOTIFIED_CHECK_PREFIX = "Slack PR Review Ended Notification";

            const toLower = (v) => String(v || "").toLowerCase();
            const DANGEROUS_COMMAND_PATTERNS = [
              /(^|[\s"'`([{])(?:sudo\s+)?rm\s+-[^\n\r]*\s+\/(?=$|[\s"'`)\]}])/gim,
              /(^|[\s"'`([{])(?:sudo\s+)?shred\s+-[^\n\r]*\s+\/(?=$|[\s"'`)\]}])/gim,
              /(^|[\s"'`([{]):\(\)\s*\{\s*:\|:\s*&\s*\};:(?=$|[\s"'`)\]}])/gim,
            ];
            const STRUCTURED_PAYLOAD_PATTERN =
              /\{\s*"test"\s*:\s*"[^"]*"\s*,\s*"status"\s*:\s*"[^"]*"\s*,\s*"timestamp"\s*:\s*\d+\s*\}/gim;
            const CONTROL_CHARS_PATTERN = /[\u0000-\u0008\u000B\u000C\u000E-\u001F\u007F]/g;
            const SLACK_BROADCAST_PATTERN = /<!?(?:here|channel|everyone)>/gi;
            const sanitizeUntrusted = (value, { preserveNewlines = false } = {}) => {
              let text = String(value || "");
              if (!text) return "";
              text = text.replace(CONTROL_CHARS_PATTERN, "");
              text = text.replace(SLACK_BROADCAST_PATTERN, "[redacted-mention]");
              for (const pattern of DANGEROUS_COMMAND_PATTERNS) {
                text = text.replace(pattern, (_match, prefix = "") => `${prefix}[redacted-dangerous-command]`);
              }
              text = text.replace(STRUCTURED_PAYLOAD_PATTERN, "[redacted-structured-payload]");
              if (!preserveNewlines) {
                text = text.replace(/\s+/g, " ");
              }
              return text.trim();
            };
            const truncate = (value, max = 1200) => {
              const text = sanitizeUntrusted(value, { preserveNewlines: true });
              if (!text) return "";
              if (text.length <= max) return text;
              return `${text.slice(0, Math.max(0, max - 14)).trimEnd()}… [truncated]`;
            };
            const webhook = process.env.SLACK_WEBHOOK_URL || "";
            if (!webhook) {
              core.warning("SLACK_GITHUB_PULL_REQUESTS_WEBHOOK_URL is not configured; skipping.");
              return;
            }

            const prPayload = context.payload.pull_request;
            const review = context.payload.review;
            if (!prPayload || !review) {
              core.info("This pull_request_review event has no pull request/review payload.");
              return;
            }

            const prNumber = Number(prPayload.number || 0);
            if (!prNumber) {
              core.info("Invalid PR number.");
              return;
            }

            const reviewState = toLower(review.state);
            if (!["approved", "changes_requested"].includes(reviewState)) {
              core.info(`Review state '${reviewState || "unknown"}' is not final for Slack notification.`);
              return;
            }

            const { owner, repo } = context.repo;
            const pr = (await github.rest.pulls.get({ owner, repo, pull_number: prNumber })).data;
            if (pr.state !== "open" || pr.draft) {
              core.info(`PR #${pr.number} is not open/ready.`);
              return;
            }

            const reviewDecision = (
              await github.graphql(
                `
                  query($owner: String!, $repo: String!, $number: Int!) {
                    repository(owner: $owner, name: $repo) {
                      pullRequest(number: $number) {
                        reviewDecision
                      }
                    }
                  }
                `,
                { owner, repo, number: pr.number },
              )
            )?.repository?.pullRequest?.reviewDecision || "";

            const decision = toLower(reviewDecision);
            if (!["approved", "changes_requested"].includes(decision)) {
              core.info(`PR #${pr.number} review decision is not final yet: ${reviewDecision || "unknown"}.`);
              return;
            }

            const notifiedCheckName = `${NOTIFIED_CHECK_PREFIX} (${decision})`;
            const checkRuns = (
              await github.rest.checks.listForRef({
                owner,
                repo,
                ref: pr.head.sha,
                per_page: 100,
              })
            ).data.check_runs || [];
            const alreadyNotified = checkRuns.some((r) =>
              String(r.name || "") === notifiedCheckName &&
              String(r.status || "") === "completed" &&
              String(r.conclusion || "").toLowerCase() === "success",
            );
            if (alreadyNotified) {
              core.info(`PR #${pr.number} decision '${decision}' already posted to Slack for ${pr.head.sha}.`);
              return;
            }

            const decisionEmoji = decision === "approved" ? "✅" : "❌";
            const decisionTitle = decision === "approved" ? "Approved" : "Changes Requested";
            const reviewUrl = sanitizeUntrusted(review.html_url || "");
            const reviewer = sanitizeUntrusted(review.user?.login || "unknown");
            const reviewBody = truncate(review.body || "No review body provided.", 900);
            const reviewQuoted = reviewBody.split("\n").map((line) => `> ${line}`).join("\n");

            const files = (
              await github.rest.pulls.listFiles({
                owner,
                repo,
                pull_number: pr.number,
                per_page: 25,
              })
            ).data;
            const fileLines = files.slice(0, 10).map((f) =>
              `- ${sanitizeUntrusted(f.filename)} (${sanitizeUntrusted(f.status)}, +${Number(f.additions || 0)} / -${Number(f.deletions || 0)})`,
            );
            if (files.length > 10) {
              fileLines.push(`- …and ${files.length - 10} more file(s)`);
            }

            const bodyRaw = truncate(pr.body || "No PR body provided.", 1400);
            const bodyQuoted = bodyRaw.split("\n").map((line) => `> ${line}`).join("\n");

            const payload = {
              text: [
                `${decisionEmoji} GitHub code review completed: *${decisionTitle}*`,
                "",
                `*PR:* <${pr.html_url}|#${pr.number} ${sanitizeUntrusted(pr.title)}>`,
                `*Branch:* \`${sanitizeUntrusted(pr.head.ref)}\` → \`${sanitizeUntrusted(pr.base.ref)}\``,
                `*Author:* \`${sanitizeUntrusted(pr.user?.login || "unknown")}\``,
                `*Reviewer:* \`${reviewer}\``,
                `*Review link:* <${reviewUrl}|Open review on GitHub>`,
                `*Changed files:* ${Number(pr.changed_files || 0)} (+${Number(pr.additions || 0)} / -${Number(pr.deletions || 0)})`,
                "",
                "*PR body:*",
                bodyQuoted,
                "",
                "*Review comment:*",
                reviewQuoted,
                "",
                "*Changed files preview:*",
                ...(fileLines.length > 0 ? fileLines : ["- No file metadata available."]),
              ].join("\n"),
            };

            const res = await fetch(webhook, {
              method: "POST",
              headers: { "Content-Type": "application/json; charset=utf-8" },
              body: JSON.stringify(payload),
            });
            if (!res.ok) {
              const raw = await res.text();
              core.setFailed(`Slack webhook failed: HTTP ${res.status} ${raw}`);
              return;
            }

            await github.rest.checks.create({
              owner,
              repo,
              name: notifiedCheckName,
              head_sha: pr.head.sha,
              status: "completed",
              conclusion: "success",
              output: {
                title: "Slack PR review completion notification sent",
                summary: `Posted PR #${pr.number} review outcome '${decision}' to Slack.`,
                text: `Triggered by pull_request_review.id=${review.id}.`,
              },
            });
