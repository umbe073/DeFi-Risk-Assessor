name: Slack PR Ready For Manual Review

on:
  check_suite:
    types:
      - completed

permissions:
  contents: read
  checks: write
  actions: read
  pull-requests: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack when all PR checks are complete/successful
        uses: actions/github-script@v7
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_GITHUB_PULL_REQUESTS_WEBHOOK_URL }}
        with:
          script: |
            const NOTIFIED_CHECK_NAME = "Slack PR Ready Notification";

            const toLower = (v) => String(v || "").toLowerCase();
            const truncate = (value, max = 1200) => {
              const text = String(value || "").trim();
              if (!text) return "";
              if (text.length <= max) return text;
              return `${text.slice(0, Math.max(0, max - 14)).trimEnd()}… [truncated]`;
            };
            const emojiForConclusion = (conclusion) => {
              const c = toLower(conclusion);
              if (c === "success") return "✅";
              if (["neutral", "skipped"].includes(c)) return "⚪";
              if (["failure", "timed_out", "cancelled", "action_required", "stale"].includes(c)) return "❌";
              return "•";
            };

            const webhook = process.env.SLACK_WEBHOOK_URL || "";
            if (!webhook) {
              core.warning("SLACK_GITHUB_PULL_REQUESTS_WEBHOOK_URL is not configured; skipping.");
              return;
            }

            const suite = context.payload.check_suite;
            const prs = Array.isArray(suite?.pull_requests) ? suite.pull_requests : [];
            if (prs.length === 0) {
              core.info("No PR attached to this check suite.");
              return;
            }

            const prNumber = Number(prs[0].number || 0);
            if (!prNumber) {
              core.info("Invalid PR number.");
              return;
            }

            const { owner, repo } = context.repo;
            const pr = (await github.rest.pulls.get({ owner, repo, pull_number: prNumber })).data;
            if (pr.state !== "open" || pr.draft) {
              core.info(`PR #${pr.number} is not open/ready.`);
              return;
            }

            const checkRuns = (
              await github.rest.checks.listForRef({
                owner,
                repo,
                ref: pr.head.sha,
                per_page: 100,
              })
            ).data.check_runs || [];

            const pending = checkRuns.filter((r) => r.status !== "completed");
            if (pending.length > 0) {
              core.info(`PR #${pr.number} still has pending checks.`);
              return;
            }

            const alreadyNotified = checkRuns.some((r) =>
              String(r.name || "") === NOTIFIED_CHECK_NAME &&
              String(r.status || "") === "completed" &&
              String(r.conclusion || "").toLowerCase() === "success",
            );
            if (alreadyNotified) {
              core.info(`PR #${pr.number} has already been posted to Slack for ${pr.head.sha}.`);
              return;
            }

            const failing = checkRuns.filter((r) => {
              const c = String(r.conclusion || "").toLowerCase();
              return !["success", "neutral", "skipped"].includes(c);
            });
            if (failing.length > 0) {
              core.info(`PR #${pr.number} has failing checks.`);
              return;
            }

            const codeqlRuns = checkRuns.filter((r) => toLower(r.name).includes("codeql"));
            const bugbotRuns = checkRuns.filter((r) => toLower(r.name).includes("bugbot"));
            const bugbotAutofixRuns = bugbotRuns.filter((r) => toLower(r.name).includes("autofix"));
            if (codeqlRuns.length === 0) {
              core.info(`PR #${pr.number} has no CodeQL checks yet.`);
              return;
            }

            const scanGood = codeqlRuns.filter((r) => toLower(r.conclusion) === "success").length;
            const scanNeutral = codeqlRuns.filter((r) => ["neutral", "skipped"].includes(toLower(r.conclusion))).length;
            const scanFailed = codeqlRuns.length - scanGood - scanNeutral;
            const codeqlLines = codeqlRuns.map((r) => {
              const c = toLower(r.conclusion) || "unknown";
              return `- ${emojiForConclusion(c)} ${r.name}: ${c}`;
            });

            const bugbotLines = bugbotRuns.map((r) => {
              const c = toLower(r.conclusion) || "unknown";
              const outputTitle = truncate(r.output?.title || "", 90);
              const outputSummary = truncate(r.output?.summary || "", 160);
              const detailBits = [outputTitle, outputSummary].filter(Boolean).join(" | ");
              const detail = detailBits ? ` — ${detailBits}` : "";
              return `- ${emojiForConclusion(c)} ${r.name}: ${c}${detail}`;
            });
            const hasInterimSignal = bugbotAutofixRuns.length > 0;

            const files = (
              await github.rest.pulls.listFiles({
                owner,
                repo,
                pull_number: pr.number,
                per_page: 25,
              })
            ).data;
            const fileLines = files.slice(0, 10).map((f) =>
              `- ${f.filename} (${f.status}, +${Number(f.additions || 0)} / -${Number(f.deletions || 0)})`,
            );
            if (files.length > 10) {
              fileLines.push(`- …and ${files.length - 10} more file(s)`);
            }

            const bodyRaw = truncate(pr.body || "No PR body provided.", 1400);
            const bodyQuoted = bodyRaw.split("\n").map((line) => `> ${line}`).join("\n");

            const payload = {
              text: [
                "A PR is ready for manual review (required checks completed). Please review the request for changes:",
                ...(hasInterimSignal
                  ? [
                      "",
                      "⚠️ *Interim PR notice:* Bugbot autofix activity was detected in this PR. Before final approval, check whether a newer follow-up PR was opened for additional fixes.",
                    ]
                  : []),
                "",
                `*PR:* <${pr.html_url}|#${pr.number} ${pr.title}>`,
                `*Branch:* \`${pr.head.ref}\` → \`${pr.base.ref}\``,
                `*Author:* \`${pr.user?.login || "unknown"}\``,
                `*Changed files:* ${Number(pr.changed_files || 0)} (+${Number(pr.additions || 0)} / -${Number(pr.deletions || 0)})`,
                "",
                "*Body of the request in details:*",
                bodyQuoted,
                "",
                "*Changes explained:*",
                ...(fileLines.length > 0 ? fileLines : ["- No file metadata available."]),
                "",
                "*Description of the failed/neutral/good code scan:*",
                `- Good: ${scanGood}`,
                `- Neutral: ${scanNeutral}`,
                `- Failed: ${scanFailed}`,
                ...codeqlLines,
                "",
                "*Actions taken by Bugbot (if any):*",
                ...(bugbotLines.length > 0 ? bugbotLines : ["- No Bugbot actions found."]),
                "",
                "Please review on GitHub and approve/merge manually when appropriate.",
              ].join("\n"),
            };

            const res = await fetch(webhook, {
              method: "POST",
              headers: { "Content-Type": "application/json; charset=utf-8" },
              body: JSON.stringify(payload),
            });
            if (!res.ok) {
              const raw = await res.text();
              core.setFailed(`Slack webhook failed: HTTP ${res.status} ${raw}`);
              return;
            }

            await github.rest.checks.create({
              owner,
              repo,
              name: NOTIFIED_CHECK_NAME,
              head_sha: pr.head.sha,
              status: "completed",
              conclusion: "success",
              output: {
                title: "Slack PR ready notification sent",
                summary: `Posted PR #${pr.number} ready-for-approval message to Slack.`,
                text: `Triggered by check_suite.id=${suite.id}.`,
              },
            });
