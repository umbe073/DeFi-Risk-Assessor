name: PR Checks

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - 'fix/**'
      - 'feature/**'
      - 'bug/**'
      - 'hotfix/**'

jobs:
  lint-and-security:
    name: v2.8 lint, smoke, and secret guard
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install tools
        run: |
          pip install -q flake8 pyflakes
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq ripgrep
          fi

      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz | tar -xz
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: Install project dependencies
        run: |
          pip install -q -r requirements.txt 2>/dev/null || true
          if [ -f scripts/v2.8/requirements.txt ]; then
            pip install -q -r scripts/v2.8/requirements.txt 2>/dev/null || true
          fi

      - name: Resolve changed files
        id: changed
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
        run: |
          git fetch --no-tags origin "${BASE_REF}:refs/remotes/origin/${BASE_REF}"
          git diff --name-only "origin/${BASE_REF}..HEAD" > /tmp/changed-files.txt
          git diff --name-only --diff-filter=AM "origin/${BASE_REF}..HEAD" > /tmp/changed-files-am.txt
          echo "Changed files:"
          sed -n '1,200p' /tmp/changed-files.txt

      - name: Scope guard (repository safety)
        run: |
          # Scope checks apply only to added/modified paths so deleting forbidden trees does not fail CI.
          if rg --pcre2 '(^|/)\.env/|(^|/)\.env$|(^|/)\.env\.(?!example$|sample$)[^/]+$|\.(db|db-shm|db-wal|sqlite|sqlite3)$|(^|/)logs/|(^|/)data/' /tmp/changed-files-am.txt >/dev/null; then
            echo "::error::PR adds or modifies forbidden runtime, secret, database, log, or data paths:"
            rg --pcre2 '(^|/)\.env/|(^|/)\.env$|(^|/)\.env\.(?!example$|sample$)[^/]+$|\.(db|db-shm|db-wal|sqlite|sqlite3)$|(^|/)logs/|(^|/)data/' /tmp/changed-files-am.txt || true
            exit 1
          fi
          if rg '^scripts/v2\.8/web_portal/' /tmp/changed-files-am.txt >/dev/null; then
            echo "::error::Website files under scripts/v2.8/web_portal are forbidden from push scope."
            exit 1
          fi
          if rg '^scripts/v2\.0/(web_portal|deploy)/|^scripts/v2\.8/deploy/' /tmp/changed-files-am.txt >/dev/null; then
            echo "::error::Operational paths (scripts/v2.0/web_portal, scripts/v2.0/deploy, scripts/v2.8/deploy) must not be committed."
            rg '^scripts/v2\.0/(web_portal|deploy)/|^scripts/v2\.8/deploy/' /tmp/changed-files-am.txt || true
            exit 1
          fi

      - name: Python syntax check (pyflakes)
        run: |
          files=$(rg --files scripts/v2.8 -g "*.py" || true)
          if [ -n "$files" ]; then
            echo "$files" | xargs python -m pyflakes
          fi

      - name: Flake8
        run: |
          files=$(rg --files scripts/v2.8 -g "*.py" || true)
          if [ -n "$files" ]; then
            flake8 scripts/v2.8 --max-line-length=120 --extend-ignore=E501,W503,E203 --statistics
          else
            echo "No python files under scripts/v2.8"
          fi

      - name: Secret leak guard (gitleaks)
        run: |
          scan_dir="$(mktemp -d)"
          while IFS= read -r file; do
            if [ -f "$file" ]; then
              mkdir -p "${scan_dir}/$(dirname "$file")"
              cp "$file" "${scan_dir}/${file}"
            fi
          done < /tmp/changed-files.txt
          if [ -z "$(find "$scan_dir" -type f -print -quit)" ]; then
            echo "No changed files to scan."
            exit 0
          fi
          GL_CFG="${GITHUB_WORKSPACE}/.gitleaks.toml"
          GL_ARGS=(detect --source "$scan_dir" --no-git --redact --exit-code 1)
          if [ -f "$GL_CFG" ]; then
            GL_ARGS+=(--config "$GL_CFG")
          fi
          report="${RUNNER_TEMP}/gitleaks.json"
          set +e
          gitleaks "${GL_ARGS[@]}" --report-format json --report-path "$report"
          rc=$?
          set -e
          if [ "$rc" -ne 0 ]; then
            echo "::error::gitleaks reported possible secrets in changed files (see JSON for RuleID and file paths)."
            if [ -f "$report" ]; then
              cat "$report"
            fi
            exit "$rc"
          fi

      - name: Secret leak guard (forbidden files)
        run: |
          bad_env=$(git ls-files | rg -n '(^|/)\.env($|\.|/)' || true)
          bad_db=$(git ls-files | rg -n '\.(db|db-shm|db-wal|sqlite|sqlite3)$' || true)
          bad_ops=$(git ls-files | rg -n '^scripts/v2\.0/(web_portal|deploy)/|^scripts/v2\.8/deploy/' || true)
          if [ -n "$bad_env" ] || [ -n "$bad_db" ] || [ -n "$bad_ops" ]; then
            echo "::error::Forbidden tracked files detected."
            echo "$bad_env"
            echo "$bad_db"
            echo "$bad_ops"
            exit 1
          fi

      - name: v2.8 smoke check
        run: |
          bash scripts/v2.8/ci/verify_v2_8_smoke.sh "$GITHUB_WORKSPACE"
