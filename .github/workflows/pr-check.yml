name: PR Checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - 'fix/**'
      - 'feature/**'
      - 'bug/**'
      - 'hotfix/**'

jobs:
  lint-and-security:
    name: v2.8 lint, smoke, and secret guard
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install tools
        run: |
          pip install -q flake8 pyflakes

      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz | tar -xz
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: Install project dependencies
        run: |
          pip install -q -r requirements.txt 2>/dev/null || true
          if [ -f scripts/v2.8/requirements.txt ]; then
            pip install -q -r scripts/v2.8/requirements.txt 2>/dev/null || true
          fi

      - name: Scope guard (only v2.8 app material)
        run: |
          disallowed=$(git diff --name-only origin/main...HEAD | rg -v '^scripts/v2\.8/' | rg -v '^\.github/' || true)
          if [ -n "$disallowed" ]; then
            echo "::error::PR contains files outside allowed scope (scripts/v2.8 + .github):"
            echo "$disallowed"
            exit 1
          fi
          if git diff --name-only origin/main...HEAD | rg '^scripts/v2\.8/web_portal/' >/dev/null; then
            echo "::error::Website files under scripts/v2.8/web_portal are forbidden from push scope."
            exit 1
          fi

      - name: Python syntax check (pyflakes)
        run: |
          files=$(rg --files scripts/v2.8 -g "*.py" || true)
          if [ -n "$files" ]; then
            echo "$files" | xargs python -m pyflakes
          fi

      - name: Flake8
        run: |
          files=$(rg --files scripts/v2.8 -g "*.py" || true)
          if [ -n "$files" ]; then
            flake8 scripts/v2.8 --max-line-length=120 --extend-ignore=E501,W503,E203 --statistics
          else
            echo "No python files under scripts/v2.8"
          fi

      - name: Secret leak guard (gitleaks)
        run: |
          gitleaks detect --source . --no-git --redact --exit-code 1

      - name: Secret leak guard (forbidden files)
        run: |
          bad_env=$(git ls-files | rg -n '(^|/)\.env($|\.|/)' || true)
          bad_db=$(git ls-files | rg -n '\.(db|db-shm|db-wal|sqlite|sqlite3)$' || true)
          if [ -n "$bad_env" ] || [ -n "$bad_db" ]; then
            echo "::error::Forbidden tracked files detected."
            echo "$bad_env"
            echo "$bad_db"
            exit 1
          fi

      - name: v2.8 smoke check
        run: |
          bash scripts/v2.8/deploy/verify_v2_8_smoke.sh "$GITHUB_WORKSPACE"
