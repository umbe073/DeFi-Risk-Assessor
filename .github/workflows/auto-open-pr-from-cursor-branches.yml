name: Auto Open PR From Cursor Branches

on:
  push:
    branches:
      - "cursor/**"

concurrency:
  group: auto-open-pr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  open-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Create PR if missing
        uses: actions/github-script@v8
        env:
          CURSOR_PR_TOKEN_SET: ${{ secrets.CURSOR_PR_AUTOMATION_TOKEN != '' }}
        with:
          github-token: ${{ secrets.CURSOR_PR_AUTOMATION_TOKEN != '' && secrets.CURSOR_PR_AUTOMATION_TOKEN || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = context.ref.replace("refs/heads/", "");
            const reviewerLogin = "degen-hodler";
            const usingAutomationToken = process.env.CURSOR_PR_TOKEN_SET === "true";

            const ensureReviewerAndMention = async (pullNumber) => {
              let reviewerRequested = false;
              const mentionToken = `@${reviewerLogin}`;
              const fallbackMentionBody = `${mentionToken} manual review requested once required checks complete.`;
              try {
                await github.rest.pulls.requestReviewers({
                  owner,
                  repo,
                  pull_number: pullNumber,
                  reviewers: [reviewerLogin],
                });
                reviewerRequested = true;
                core.info(`Requested reviewer @${reviewerLogin} on PR #${pullNumber}.`);
              } catch (error) {
                const message = String(error?.message || error?.response?.data?.message || "");
                const normalized = message.toLowerCase();
                if (
                  error?.status === 422 ||
                  error?.status === 403 ||
                  normalized.includes("could not request reviews")
                ) {
                  core.warning(
                    `Could not request reviewer @${reviewerLogin} on PR #${pullNumber}: ${message}`,
                  );
                } else {
                  throw error;
                }
              }

              try {
                const comments = (
                  await github.rest.issues.listComments({
                    owner,
                    repo,
                    issue_number: pullNumber,
                    per_page: 100,
                  })
                ).data || [];
                const hasMention = comments.some((item) =>
                  String(item?.body || "").includes(mentionToken),
                );
                if (!reviewerRequested && !hasMention) {
                  await github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number: pullNumber,
                    body: fallbackMentionBody,
                  });
                  core.info(`Posted fallback reviewer mention for @${reviewerLogin} on PR #${pullNumber}.`);
                } else if (reviewerRequested) {
                  core.info(
                    `Reviewer request succeeded for PR #${pullNumber}; skipping mention comment to avoid duplicate Slack notifications.`,
                  );
                }
              } catch (error) {
                core.warning(
                  `Unable to post reviewer mention comment on PR #${pullNumber}: ${String(
                    error?.message || error,
                  )}`,
                );
              }
            };

            if (!head.startsWith("cursor/")) {
              core.info(`Ignoring non-cursor branch: ${head}`);
              return;
            }

            const repoInfo = await github.rest.repos.get({ owner, repo });
            const base = repoInfo.data.default_branch || "main";

            const existing = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head: `${owner}:${head}`,
              base,
              per_page: 1,
            });
            if (existing.data.length > 0) {
              const existingNumber = Number(existing.data[0].number || 0);
              core.info(`PR already open: #${existingNumber}`);
              if (existingNumber > 0) {
                await ensureReviewerAndMention(existingNumber);
              }
              return;
            }

            const pretty = head.replace(/^cursor\//, "").replace(/[-_]+/g, " ").trim();
            const title = `[Cursor] ${pretty || head}`;
            const body = [
              "Auto-opened PR from Cursor push.",
              "",
              `- Source branch: \`${head}\``,
              `- Base branch: \`${base}\``,
              "",
              "Manual GitHub review and merge required after checks complete.",
            ].join("\n");

            try {
              const created = await github.rest.pulls.create({
                owner,
                repo,
                title,
                head,
                base,
                body,
                draft: false,
                maintainer_can_modify: true,
              });
              core.info(`Created PR #${created.data.number}: ${created.data.html_url}`);
              await ensureReviewerAndMention(Number(created.data.number || 0));
            } catch (error) {
              const apiMessage = error?.response?.data?.message || error?.message || "";
              const normalizedMessage = String(apiMessage).toLowerCase();
              if (
                error?.status === 422 &&
                normalizedMessage.includes("a pull request already exists")
              ) {
                core.notice(`PR already exists for branch ${head}; nothing to do.`);
                return;
              }
              if (
                error?.status === 403 &&
                normalizedMessage.includes("not permitted to create or approve pull requests")
              ) {
                const compareUrl = `https://github.com/${owner}/${repo}/compare/${base}...${head}?expand=1`;
                core.warning(`Auto-creating PR is blocked by repository policy: ${apiMessage}`);
                if (!usingAutomationToken) {
                  core.notice(
                    "Set repository secret CURSOR_PR_AUTOMATION_TOKEN (PAT with repo scope) or enable " +
                      '"Allow GitHub Actions to create and approve pull requests" under Actions settings.',
                  );
                } else {
                  core.notice(
                    "CURSOR_PR_AUTOMATION_TOKEN is configured but still blocked. Verify this token can create PRs in this repository.",
                  );
                }
                core.notice(`Open PR manually here: ${compareUrl}`);
                return;
              }
              throw error;
            }
