name: Auto Open PR From Cursor Branches

on:
  push:
    branches:
      - "cursor/**"

concurrency:
  group: auto-open-pr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  open-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Create PR if missing
        uses: actions/github-script@v7
        env:
          CURSOR_PR_TOKEN_SET: ${{ secrets.CURSOR_PR_AUTOMATION_TOKEN != '' }}
        with:
          github-token: ${{ secrets.CURSOR_PR_AUTOMATION_TOKEN != '' && secrets.CURSOR_PR_AUTOMATION_TOKEN || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = context.ref.replace("refs/heads/", "");
            const usingAutomationToken = process.env.CURSOR_PR_TOKEN_SET === "true";

            if (!head.startsWith("cursor/")) return;

            const repoInfo = await github.rest.repos.get({ owner, repo });
            const base = repoInfo.data.default_branch || "main";

            const existing = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head: `${owner}:${head}`,
              base,
              per_page: 1,
            });
            if (existing.data.length > 0) return;

            const pretty = head.replace(/^cursor\//, "").replace(/[-_]+/g, " ").trim();
            const title = `[Cursor] ${pretty || head}`;
            const body = [
              "Auto-opened PR from Cursor push.",
              "",
              `- Source branch: \`${head}\``,
              `- Base branch: \`${base}\``,
              "",
              "Manual GitHub review and merge required after checks complete.",
            ].join("\n");
            try {
              await github.rest.pulls.create({
                owner,
                repo,
                title,
                head,
                base,
                body,
                draft: false,
                maintainer_can_modify: true,
              });
            } catch (error) {
              const apiMessage = error?.response?.data?.message || error.message || "";
              const normalizedMessage = String(apiMessage).toLowerCase();
              if (
                error?.status === 422 &&
                normalizedMessage.includes("a pull request already exists")
              ) {
                // A concurrent run may have created the PR first.
                core.notice(`PR already exists for branch ${head}; nothing to do.`);
                return;
              }
              if (
                error?.status === 403 &&
                normalizedMessage.includes("not permitted to create or approve pull requests")
              ) {
                const compareUrl = `https://github.com/${owner}/${repo}/compare/${base}...${head}?expand=1`;
                core.warning(`Auto-creating PR is blocked by repository policy: ${apiMessage}`);
                if (!usingAutomationToken) {
                  core.notice(
                    "Set repository secret CURSOR_PR_AUTOMATION_TOKEN (PAT with repo scope) or enable " +
                      '"Allow GitHub Actions to create and approve pull requests" under Actions settings.'
                  );
                } else {
                  core.notice(
                    "CURSOR_PR_AUTOMATION_TOKEN is configured but still blocked. Verify this token can create PRs in this repository."
                  );
                }
                core.notice(`Open PR manually here: ${compareUrl}`);
                return;
              }
              throw error;
            }
