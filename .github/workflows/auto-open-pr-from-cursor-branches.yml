name: Auto Open PR From Cursor Branches

on:
  push:
    branches:
      - "cursor/**"

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  open-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Create PR if missing
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = context.ref.replace("refs/heads/", "");
            const reviewerLogin = "degen-hodler";

            const ensureReviewerAndMention = async (pullNumber) => {
              let reviewerRequested = false;
              try {
                await github.rest.pulls.requestReviewers({
                  owner,
                  repo,
                  pull_number: pullNumber,
                  reviewers: [reviewerLogin],
                });
                reviewerRequested = true;
                core.info(`Requested reviewer @${reviewerLogin} on PR #${pullNumber}.`);
              } catch (error) {
                const message = String(error?.message || error?.response?.data?.message || "");
                const normalized = message.toLowerCase();
                if (
                  error?.status === 422 ||
                  error?.status === 403 ||
                  normalized.includes("could not request reviews")
                ) {
                  core.warning(
                    `Could not request reviewer @${reviewerLogin} on PR #${pullNumber}: ${message}`,
                  );
                } else {
                  throw error;
                }
              }

              try {
                const comments = (
                  await github.rest.issues.listComments({
                    owner,
                    repo,
                    issue_number: pullNumber,
                    per_page: 100,
                  })
                ).data || [];
                const mentionToken = `@${reviewerLogin}`;
                const hasMention = comments.some((item) =>
                  String(item?.body || "").includes(mentionToken),
                );
                if (!hasMention || !reviewerRequested) {
                  await github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number: pullNumber,
                    body: `${mentionToken} manual review requested once required checks complete.`,
                  });
                  core.info(`Posted reviewer mention for @${reviewerLogin} on PR #${pullNumber}.`);
                }
              } catch (error) {
                core.warning(
                  `Unable to post reviewer mention comment on PR #${pullNumber}: ${String(
                    error?.message || error,
                  )}`,
                );
              }
            };

            if (!head.startsWith("cursor/")) {
              core.info(`Ignoring non-cursor branch: ${head}`);
              return;
            }

            const repoInfo = await github.rest.repos.get({ owner, repo });
            const base = repoInfo.data.default_branch || "main";

            const existing = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head: `${owner}:${head}`,
              base,
              per_page: 1,
            });

            if (existing.data.length > 0) {
              const existingNumber = Number(existing.data[0].number || 0);
              core.info(`PR already open: #${existingNumber}`);
              if (existingNumber > 0) {
                await ensureReviewerAndMention(existingNumber);
              }
              return;
            }

            const pretty = head.replace(/^cursor\//, "").replace(/[-_]+/g, " ").trim();
            const title = `[Cursor] ${pretty || head}`;
            const body = [
              "Auto-opened PR from Cursor push.",
              "",
              `- Source branch: \`${head}\``,
              `- Base branch: \`${base}\``,
              "",
              "Manual GitHub review and merge required after checks complete.",
            ].join("\n");

            const created = await github.rest.pulls.create({
              owner,
              repo,
              title,
              head,
              base,
              body,
              draft: false,
              maintainer_can_modify: true,
            });

            core.info(`Created PR #${created.data.number}: ${created.data.html_url}`);
            await ensureReviewerAndMention(Number(created.data.number || 0));
