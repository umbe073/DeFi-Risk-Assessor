name: Approve PR From Slack Reaction

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to approve
        required: true
      reaction:
        description: Slack reaction name (for example :white_check_mark:)
        required: true
      slack_user:
        description: Slack user id or username who added the reaction
        required: false
      slack_channel:
        description: Slack channel name or id
        required: false

permissions:
  contents: read
  pull-requests: write

jobs:
  approve-on-checkmark:
    runs-on: ubuntu-latest
    steps:
      - name: Approve PR for checkmark reactions
        uses: actions/github-script@v7
        env:
          ALLOWED_SLACK_CHANNELS: github_pull_requests
        with:
          github-token: ${{ secrets.CURSOR_PR_AUTOMATION_TOKEN != '' && secrets.CURSOR_PR_AUTOMATION_TOKEN || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            function firstDefined(...values) {
              for (const value of values) {
                if (value !== undefined && value !== null && String(value).trim() !== "") {
                  return value;
                }
              }
              return undefined;
            }

            function toPositiveInteger(value) {
              if (typeof value === "number" && Number.isInteger(value) && value > 0) return value;
              if (typeof value === "string" && /^[1-9]\d*$/.test(value.trim())) return Number(value.trim());
              return null;
            }

            function normalizeReaction(value) {
              if (typeof value !== "string") return "";
              const trimmed = value.trim();
              if (!trimmed) return "";
              if (trimmed === "✅") return "white_check_mark";
              const key = trimmed.replace(/^:+|:+$/g, "").toLowerCase();
              const aliases = {
                "white_check_mark": "white_check_mark",
                "white-check-mark": "white_check_mark",
                "heavy_check_mark": "white_check_mark",
                "heavy-check-mark": "white_check_mark",
                "check_mark": "white_check_mark",
                "check-mark": "white_check_mark",
              };
              return aliases[key] || key;
            }

            function normalizeChannel(value) {
              if (typeof value !== "string") return "";
              return value.trim().replace(/^#/, "").toLowerCase();
            }

            const payload = context.eventName === "workflow_dispatch"
              ? {
                  pr_number: core.getInput("pr_number"),
                  reaction: core.getInput("reaction"),
                  slack_user: core.getInput("slack_user"),
                  slack_channel: core.getInput("slack_channel"),
                }
              : (context.payload.client_payload || {});

            const reaction = normalizeReaction(
              firstDefined(
                payload.reaction,
                payload.emoji,
                payload.reaction_name,
                payload.event?.reaction,
                payload.event?.item?.reaction,
                payload.slack?.reaction
              )
            );

            if (reaction !== "white_check_mark") {
              core.notice(`Ignoring non-approval reaction: "${reaction || "unknown"}"`);
              return;
            }

            const prNumber = toPositiveInteger(
              firstDefined(
                payload.pr_number,
                payload.pull_request?.number,
                payload.pr?.number,
                payload.number
              )
            );

            if (!prNumber) {
              core.setFailed("Missing valid pull request number in dispatch payload.");
              return;
            }

            const channel = String(
              firstDefined(
                payload.slack_channel,
                payload.channel_name,
                payload.channelName,
                payload.channel,
                payload.event?.channel,
                payload.event?.item?.channel,
                payload.slack?.channel
              ) || ""
            ).trim();
            const allowedChannels = (process.env.ALLOWED_SLACK_CHANNELS || "")
              .split(",")
              .map((name) => normalizeChannel(name))
              .filter(Boolean);
            const normalizedChannel = normalizeChannel(channel);
            if (allowedChannels.length > 0 && (!normalizedChannel || !allowedChannels.includes(normalizedChannel))) {
              core.notice(
                channel
                  ? `Ignoring reaction from unauthorized channel "${channel}".`
                  : "Ignoring reaction with missing Slack channel."
              );
              return;
            }

            const pr = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
            if (pr.data.state !== "open") {
              core.notice(`PR #${prNumber} is not open; nothing to approve.`);
              return;
            }

            let approverLogin = "github-actions[bot]";
            try {
              const { data: authenticatedUser } = await github.rest.users.getAuthenticated();
              if (authenticatedUser?.login) approverLogin = authenticatedUser.login;
            } catch (error) {
              const message = error instanceof Error ? error.message : String(error);
              core.warning(
                `Failed to determine authenticated reviewer; defaulting to "${approverLogin}": ${message}`
              );
            }

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number: prNumber,
              per_page: 100,
            });
            const alreadyApprovedByAction = reviews.some(
              (review) => review.user?.login === approverLogin && review.state === "APPROVED"
            );
            if (alreadyApprovedByAction) {
              core.notice(`PR #${prNumber} is already approved by ${approverLogin}.`);
              return;
            }

            const slackUser = String(
              firstDefined(
                payload.slack_user,
                payload.user,
                payload.user_name,
                payload.username,
                payload.event?.user
              ) || "unknown"
            );
            const channelNote = channel ? ` in Slack channel "${channel}"` : "";
            await github.rest.pulls.createReview({
              owner,
              repo,
              pull_number: prNumber,
              event: "APPROVE",
              body: `Approved from Slack :white_check_mark: reaction by "${slackUser}"${channelNote}.`,
            });
            core.notice(`Approved PR #${prNumber} from Slack reaction.`);
