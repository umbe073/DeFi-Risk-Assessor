name: Process PR From Slack Reaction

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to approve
        required: true
      reaction:
        description: "Slack reaction name (for example :white_check_mark: or :no_entry:)"
        required: true
      slack_user:
        description: Slack user id or username who added the reaction
        required: false
      slack_channel:
        description: Slack channel name or id
        required: false

permissions:
  contents: read
  pull-requests: write

jobs:
  process-reaction:
    runs-on: ubuntu-latest
    steps:
      - name: Process approval/rejection reaction
        uses: actions/github-script@v7
        env:
          ALLOWED_SLACK_CHANNELS: github_pull_requests
          MERGE_METHOD: squash
        with:
          github-token: ${{ secrets.CURSOR_PR_AUTOMATION_TOKEN != '' && secrets.CURSOR_PR_AUTOMATION_TOKEN || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            function firstDefined(...values) {
              for (const value of values) {
                if (value !== undefined && value !== null && String(value).trim() !== "") {
                  return value;
                }
              }
              return undefined;
            }

            function toPositiveInteger(value) {
              if (typeof value === "number" && Number.isInteger(value) && value > 0) return value;
              if (typeof value === "string" && /^[1-9]\d*$/.test(value.trim())) return Number(value.trim());
              return null;
            }

            function normalizeReaction(value) {
              if (typeof value !== "string") return "";
              const trimmed = value.trim();
              if (!trimmed) return "";
              if (trimmed === "✅") return "white_check_mark";
              if (trimmed === "⛔" || trimmed === "🚫") return "no_entry";
              const key = trimmed.replace(/^:+|:+$/g, "").toLowerCase();
              const aliases = {
                "white_check_mark": "white_check_mark",
                "white-check-mark": "white_check_mark",
                "heavy_check_mark": "white_check_mark",
                "heavy-check-mark": "white_check_mark",
                "check_mark": "white_check_mark",
                "check-mark": "white_check_mark",
                "no_entry": "no_entry",
                "no-entry": "no_entry",
                "no_entry_sign": "no_entry",
                "no-entry-sign": "no_entry",
              };
              return aliases[key] || key;
            }

            function normalizeChannel(value) {
              if (typeof value !== "string") return "";
              return value.trim().replace(/^#/, "").toLowerCase();
            }

            const payload = context.eventName === "workflow_dispatch"
              ? {
                  pr_number: core.getInput("pr_number"),
                  reaction: core.getInput("reaction"),
                  slack_user: core.getInput("slack_user"),
                  slack_channel: core.getInput("slack_channel"),
                }
              : (context.payload.client_payload || {});

            const reaction = normalizeReaction(
              firstDefined(
                payload.reaction,
                payload.emoji,
                payload.reaction_name,
                payload.event?.reaction,
                payload.event?.item?.reaction,
                payload.slack?.reaction
              )
            );

            if (!["white_check_mark", "no_entry"].includes(reaction)) {
              core.notice(`Ignoring unsupported reaction: "${reaction || "unknown"}"`);
              return;
            }

            const prNumber = toPositiveInteger(
              firstDefined(
                payload.pr_number,
                payload.pull_request?.number,
                payload.pr?.number,
                payload.number
              )
            );

            if (!prNumber) {
              core.setFailed("Missing valid pull request number in dispatch payload.");
              return;
            }

            const channel = String(
              firstDefined(
                payload.slack_channel,
                payload.channel_name,
                payload.channelName,
                payload.channel,
                payload.event?.channel,
                payload.event?.item?.channel,
                payload.slack?.channel
              ) || ""
            ).trim();
            const allowedChannels = (process.env.ALLOWED_SLACK_CHANNELS || "")
              .split(",")
              .map((name) => normalizeChannel(name))
              .filter(Boolean);
            const normalizedChannel = normalizeChannel(channel);
            if (allowedChannels.length > 0 && (!normalizedChannel || !allowedChannels.includes(normalizedChannel))) {
              core.notice(
                channel
                  ? `Ignoring reaction from unauthorized channel "${channel}".`
                  : "Ignoring reaction with missing Slack channel."
              );
              return;
            }

            const pr = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
            if (pr.data.state !== "open") {
              core.notice(`PR #${prNumber} is not open; nothing to process.`);
              return;
            }

            let reviewerLogin = "github-actions[bot]";
            try {
              const { data: authenticatedUser } = await github.rest.users.getAuthenticated();
              if (authenticatedUser?.login) reviewerLogin = authenticatedUser.login;
            } catch (error) {
              const message = error instanceof Error ? error.message : String(error);
              core.warning(
                `Failed to determine authenticated reviewer; defaulting to "${reviewerLogin}": ${message}`
              );
            }

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number: prNumber,
              per_page: 100,
            });

            const slackUser = String(
              firstDefined(
                payload.slack_user,
                payload.user,
                payload.user_name,
                payload.username,
                payload.event?.user
              ) || "unknown"
            );
            const channelNote = channel ? ` in Slack channel "${channel}"` : "";

            if (reaction === "white_check_mark") {
              const alreadyApprovedByAction = reviews.some(
                (review) => review.user?.login === reviewerLogin && review.state === "APPROVED"
              );
              if (!alreadyApprovedByAction) {
                await github.rest.pulls.createReview({
                  owner,
                  repo,
                  pull_number: prNumber,
                  event: "APPROVE",
                  body: `Approved from Slack :white_check_mark: reaction by "${slackUser}"${channelNote}.`,
                });
              } else {
                core.notice(`PR #${prNumber} is already approved by ${reviewerLogin}.`);
              }

              const mergeMethodInput = String(process.env.MERGE_METHOD || "squash").toLowerCase().trim();
              const mergeMethod = ["merge", "squash", "rebase"].includes(mergeMethodInput)
                ? mergeMethodInput
                : "squash";
              try {
                const mergeResult = await github.rest.pulls.merge({
                  owner,
                  repo,
                  pull_number: prNumber,
                  merge_method: mergeMethod,
                });
                if (mergeResult.data.merged) {
                  core.notice(`Approved and merged PR #${prNumber} from Slack reaction.`);
                } else {
                  core.notice(`PR #${prNumber} approved, but merge API returned not merged.`);
                }
              } catch (error) {
                const status = error?.status;
                const apiMessage = String(error?.response?.data?.message || error?.message || error);
                if ([405, 409, 422].includes(status)) {
                  core.notice(`PR #${prNumber} approved, but could not be auto-merged: ${apiMessage}`);
                  return;
                }
                throw error;
              }
              return;
            }

            const alreadyRequestedChangesByAction = reviews.some(
              (review) => review.user?.login === reviewerLogin && review.state === "CHANGES_REQUESTED"
            );
            if (!alreadyRequestedChangesByAction) {
              await github.rest.pulls.createReview({
                owner,
                repo,
                pull_number: prNumber,
                event: "REQUEST_CHANGES",
                body: `Rejected from Slack :no_entry: reaction by "${slackUser}"${channelNote}.`,
              });
            } else {
              core.notice(`PR #${prNumber} already has requested changes from ${reviewerLogin}.`);
            }

            await github.rest.pulls.update({
              owner,
              repo,
              pull_number: prNumber,
              state: "closed",
            });
            core.notice(`Rejected and closed PR #${prNumber} from Slack reaction.`);
