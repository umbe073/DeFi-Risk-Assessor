name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Auto deploy v2.8 with rollback
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # Write PEM/OpenSSH key as-is; strip CR (Windows paste) which breaks libcrypto parsing.
          printf '%s\n' "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Fail fast if the secret is not a valid private key (-P '' avoids hang on passphrase keys).
          ssh-keygen -y -P '' -f ~/.ssh/deploy_key >/dev/null
          ssh-keyscan -p ${{ secrets.DEPLOY_SSH_PORT || 22 }} ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy script to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p "${DEPLOY_PORT:-22}" \
            -o StrictHostKeyChecking=no \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "mkdir -p '${{ secrets.DEPLOY_PATH }}/scripts/v2.8/deploy'"
          scp -i ~/.ssh/deploy_key \
            -P "${DEPLOY_PORT:-22}" \
            -o StrictHostKeyChecking=no \
            scripts/v2.8/deploy/auto_sync_and_deploy.sh \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${{ secrets.DEPLOY_PATH }}/scripts/v2.8/deploy/auto_sync_and_deploy.sh"

      - name: Run remote deploy
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_WEB_SERVICE: ${{ secrets.DEPLOY_WEB_SERVICE }}
          DEPLOY_SCRIPT_SERVICE: ${{ secrets.DEPLOY_SCRIPT_SERVICE }}
          DEPLOY_RUNTIME_TARGET_DIR: ${{ secrets.DEPLOY_RUNTIME_TARGET_DIR }}
          DEPLOY_HEALTH_URL_APP: ${{ secrets.DEPLOY_HEALTH_URL_APP }}
          DEPLOY_HEALTH_URL_SCRIPT: ${{ secrets.DEPLOY_HEALTH_URL_SCRIPT }}
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p "${DEPLOY_PORT:-22}" \
            -o StrictHostKeyChecking=no \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "chmod 700 '${DEPLOY_PATH}/scripts/v2.8/deploy/auto_sync_and_deploy.sh' && APP_ROOT='${DEPLOY_PATH}' RUNTIME_TARGET_DIR='${DEPLOY_RUNTIME_TARGET_DIR:-${DEPLOY_PATH}/scripts/v2.0}' WEB_SERVICE='${DEPLOY_WEB_SERVICE:-hodler-web-portal.service}' SCRIPT_SERVICE='${DEPLOY_SCRIPT_SERVICE:-defirisk-webhook.service}' HEALTH_URL_APP='${DEPLOY_HEALTH_URL_APP:-http://127.0.0.1/healthz}' HEALTH_URL_SCRIPT='${DEPLOY_HEALTH_URL_SCRIPT:-http://127.0.0.1:5001/webhook/health/deep/polygon}' BRANCH='main' bash '${DEPLOY_PATH}/scripts/v2.8/deploy/auto_sync_and_deploy.sh'"

      - name: Notify Slack — success
        if: success()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "✅ *Deploy succeeded* — `${{ github.repository }}` @ `${{ github.sha_short || github.sha }}` merged by *${{ github.actor }}*.\n<${{ github.event.compare }}|View diff>"
            }
        env:
          # Reuses the existing SLACK_GITHUB_PULL_REQUESTS_WEBHOOK_URL secret — no new secret needed.
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_GITHUB_PULL_REQUESTS_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack — failure
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "🚨 *Deploy FAILED* — `${{ github.repository }}` @ `${{ github.sha }}` by *${{ github.actor }}*.\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_GITHUB_PULL_REQUESTS_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
