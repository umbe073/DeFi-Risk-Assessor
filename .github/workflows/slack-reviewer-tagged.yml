name: Slack Reviewer Tagged

on:
  pull_request:
    types:
      - review_requested

permissions:
  contents: read
  pull-requests: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack when Hodler Suite Administrator is tagged
        uses: actions/github-script@v8
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_GITHUB_PULL_REQUESTS_WEBHOOK_URL }}
          TARGET_REVIEWER: degen-hodler
          DISPLAY_NAME: Hodler Suite Administrator
        with:
          script: |
            const webhook = process.env.SLACK_WEBHOOK_URL || "";
            if (!webhook) {
              core.warning("SLACK_GITHUB_PULL_REQUESTS_WEBHOOK_URL is not configured; skipping.");
              return;
            }

            const target = String(process.env.TARGET_REVIEWER || "degen-hodler").trim().toLowerCase();
            const displayName = String(process.env.DISPLAY_NAME || "Hodler Suite Administrator").trim();
            let shouldNotify = false;
            let prNumber = 0;
            let prUrl = "";
            let prTitle = "";
            let actor = "";
            const requested = String(context.payload.requested_reviewer?.login || "").trim().toLowerCase();
            if (requested === target) {
              shouldNotify = true;
              const pr = context.payload.pull_request || {};
              prNumber = Number(pr.number || 0);
              prUrl = String(pr.html_url || "");
              prTitle = String(pr.title || "");
              actor = String(context.payload.sender?.login || "unknown");
            }

            if (!shouldNotify || prNumber <= 0 || !prUrl) {
              core.info("No matching reviewer tag event detected.");
              return;
            }

            const payload = {
              text: [
                "🔔 *Manual review notification*",
                `${displayName} has been tagged for code review.`,
                "",
                `*PR:* <${prUrl}|#${prNumber} ${prTitle || "untitled"}>`,
                `*Triggered by:* \`${actor || "unknown"}\` (review request)`,
                "Please review from the dedicated review account, then approve and merge from the main account.",
              ].join("\n"),
            };

            const res = await fetch(webhook, {
              method: "POST",
              headers: { "Content-Type": "application/json; charset=utf-8" },
              body: JSON.stringify(payload),
            });
            if (!res.ok) {
              const raw = await res.text();
              core.setFailed(`Slack webhook failed: HTTP ${res.status} ${raw}`);
            }
